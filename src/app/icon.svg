<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <style>
    .ink { stroke: #0a0a0a; }
    .spark { fill: #2f6bff; }
    @media (prefers-color-scheme: dark) {
      .ink { stroke: #fafafa; }
    }
  </style>
  <!-- Striding Homo sapiens: forward motion = evolution that never stops -->
  <g class="ink" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- spine -->
    <path d="M26 39 L30 19" />
    <!-- head -->
    <circle cx="31" cy="12.5" r="5.5" fill="none" />
    <!-- arms (swinging) -->
    <path d="M28.5 23 L41 30" />
    <path d="M28.5 23 L17 27" />
    <!-- legs (mid-stride) -->
    <path d="M26 39 L38 49 L44 60" />
    <path d="M26 39 L16 50 L10 60" />
  </g>
  <!-- curiosity spark -->
  <path class="spark" d="M47 6 l1.7 4.3 4.3 1.7 -4.3 1.7 -1.7 4.3 -1.7 -4.3 -4.3 -1.7 4.3 -1.7 z" />
</svg>
